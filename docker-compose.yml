services:
  db:
    image: postgres:12
    environment:
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    # Test config opens up to pool_size: 100 connections; default
    # max_connections is 100 with no headroom for postgres itself.
    command: ["postgres", "-c", "max_connections=200"]
    # No host port binding by default — `rc` reaches it via the internal
    # Docker network as `db:5432` (see RDBMS_HOST). For ad-hoc host-side
    # access use `docker compose exec db psql -U postgres`. If you really
    # need a host port, add it via a docker-compose.override.yml.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  rc:
    depends_on:
      db:
        condition: service_healthy
    build:
      context: .
      dockerfile: dev.Dockerfile
    environment:
      RDBMS_HOST: db
      MIX_ENV: dev
      # Shared secret for the /api/harness/* endpoints. The bot harness
      # container must present the same value in X-Harness-Secret. In
      # prod this is set per-deployment via env injection.
      RC_BOT_HARNESS_SECRET: "dev-harness-secret"
    # Host ports are parametrized so parallel worktrees can run side-by-side.
    # Run `bin/rc-worktree-setup` (or .ps1) once in each worktree to allocate
    # a unique slot — it writes RC_HTTP_PORT / RC_FRONT_PORT into .env, which
    # Compose auto-loads. Defaults preserve single-worktree behavior.
    ports:
      - "${RC_HTTP_PORT:-4000}:4000"
      - "${RC_FRONT_PORT:-8080}:8080"
    volumes:
      - ./:/data
      - rc-deps:/data/deps
      - rc-build:/data/_build
      - rc-assets-node-modules:/data/assets/node_modules
      - rc-front-node-modules:/data/front/node_modules
      - rc-state:/var/lib/rc-state

volumes:
  pgdata:
  rc-deps:
  rc-build:
  rc-assets-node-modules:
  rc-front-node-modules:
  rc-state:
