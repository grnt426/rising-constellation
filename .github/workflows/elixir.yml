name: Phoenix CI

on:
  push:
    branches: ['*']
  pull_request:

env:
  MIX_ENV: test

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:12
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest (24.04) no longer preinstalls ImageMagick, which
      # Waffle shells out to (`convert`) in the upload/thumbnail tests;
      # librsvg2-bin provides rsvg-convert for the Forge scenario
      # thumbnail renderer (missing since that feature landed — tests
      # only warned, but it spams the log).
      - name: Install image tooling
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends imagemagick librsvg2-bin

      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          # .tool-versions pins erlang 27.1, but OTP 27.1's TLS client
          # rejects hex.pm's current certificate chain
          # (key_usage_mismatch, an ssl bug fixed in later 27.x
          # patches), which kills `mix local.rebar` / deps.get on the
          # runner. Track the latest OTP 27 patch release here instead.
          otp-version: '27'
          elixir-version: '1.17.3'

      - name: Restore mix deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.MIX_ENV }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.MIX_ENV }}-
            ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix deps.compile

      - run: mix format --check-formatted

      - name: Credo (advisory)
        run: mix credo --strict
        # Advisory until we burn down the existing findings. Don't block PRs.
        continue-on-error: true

      - name: Create + migrate test DB
        run: |
          mix ecto.create --quiet
          mix ecto.migrate --quiet

      - run: mix test

  frontend:
    name: frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # assets/package.json references phoenix, phoenix_html, and
      # phoenix_live_view as file:../deps/* packages, so the Elixir
      # deps must exist on disk before the assets webpack build —
      # otherwise it fails with "Can't resolve 'phoenix'" plus a
      # follow-on Terser parse error on the error-stub bundle.
      # deps.get is enough; nothing needs compiling.
      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          # .tool-versions pins erlang 27.1, but OTP 27.1's TLS client
          # rejects hex.pm's current certificate chain
          # (key_usage_mismatch, an ssl bug fixed in later 27.x
          # patches), which kills `mix local.rebar` / deps.get on the
          # runner. Track the latest OTP 27 patch release here instead.
          otp-version: '27'
          elixir-version: '1.17.3'

      - name: Restore mix deps cache (sources only)
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-deps-only-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-only-

      - run: mix deps.get

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match .tool-versions
          node-version: '20.18.0'
          cache: npm
          cache-dependency-path: |
            assets/package-lock.json
            front/package-lock.json

      - name: assets/ install + build
        run: |
          cd assets
          npm ci --no-audit
          NODE_OPTIONS="--openssl-legacy-provider" npm run deploy

      - name: front/ install + build
        run: |
          cd front
          npm ci --no-audit
          NODE_OPTIONS="--openssl-legacy-provider" npm run build
