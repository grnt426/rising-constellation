name: Phoenix CI

on:
  push:
    branches: ['*']
  pull_request:

env:
  MIX_ENV: test

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:12
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          # Match .tool-versions
          otp-version: '27.1'
          elixir-version: '1.17.3'

      - name: Restore mix deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.MIX_ENV }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.MIX_ENV }}-
            ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix deps.compile

      - run: mix format --check-formatted

      - name: Credo (advisory)
        run: mix credo --strict
        # Advisory until we burn down the existing findings. Don't block PRs.
        continue-on-error: true

      - name: Create + migrate test DB
        run: |
          mix ecto.create --quiet
          mix ecto.migrate --quiet

      - run: mix test

  frontend:
    name: frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match .tool-versions
          node-version: '20.18.0'
          cache: npm
          cache-dependency-path: |
            assets/package-lock.json
            front/package-lock.json

      - name: assets/ install + build
        run: |
          cd assets
          npm ci --no-audit
          NODE_OPTIONS="--openssl-legacy-provider" npm run deploy

      - name: front/ install + build
        run: |
          cd front
          npm ci --no-audit
          NODE_OPTIONS="--openssl-legacy-provider" npm run build
